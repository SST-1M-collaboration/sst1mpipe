name: sst1m-dev
channels:
  - conda-forge
  - default
dependencies:
  - python>=3.10
  - pip
  - ctapipe=0.17.0
  - click
  - gammapy>=1.0
  - jupyter
  - protozfits=2.0
  - astroquery=0.4.6
  - matplotlib<=3.8
  - pydantic<2.0
  - pytest
  - ruff
  - setuptools
  - sphinx
  - sphinx-automodapi
  - sphinx-design
  - sphinx_rtd_theme
  - sphinx-togglebutton
  - numpydoc
  - pip:
      - ctaplot~=0.6.2
      - pyirf~=0.8.0
      - git+https://github.com/SST-1M-collaboration/CTS.git
