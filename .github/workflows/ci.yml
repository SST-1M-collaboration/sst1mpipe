name: ci
on: [push]

jobs:
 build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Micromamba env
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          init-shell: bash
          cache-environment: true
          post-cleanup: 'all'
      - name: Activate micromamba env
        run: micromamba activate sst1m-dev
      - name: Install sst1mpipe
        run: pip install .
      - name: Run pytest
        run: pytest sst1mpipe/tests/